<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zemenpay | Contact Support</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container { max-width: 800px; margin: 40px auto; }
        .form-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 5px solid #0F52BA;
        }
        .form-box h3 { color: #0F52BA; font-size: 1.8rem; margin-bottom: 10px; }
        .form-box p { color: #666; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-row .form-group { flex: 1; }
        
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #333; font-size: 0.9rem; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 6px; 
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #0F52BA; outline: none; }
        textarea { height: 150px; resize: vertical; }

        .btn-submit { 
            background: #0F52BA; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-weight: 900; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-submit:hover { background: #fcd116; color: #0F52BA; }
        
        #status-msg { 
            text-align: center; 
            padding: 10px; 
            border-radius: 4px; 
            font-weight: 700; 
            margin-top: 15px; 
        }
        .email-error {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
        .email-warning {
            color: #f39c12;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <script src="nav.js"></script>

    <main class="container">
        <section id="consultation-form" class="form-container">
            <div class="form-box">
                <h3>Support Request</h3>
                <p>Your request will be sent to our engineering team for review.</p>
                
                <form id="support-form-element">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" id="f_name" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" id="l_name" required placeholder="Peter">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" name="email" id="email_addr" required placeholder="support@zemenpay.com">
                        <div class="email-error" id="email-error"></div>
                        <div class="email-warning" id="email-warning"></div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" id="phone_num" required placeholder="+971 ...">
                    </div>

                    <div class="form-group">
                        <label>Message (Max 1500 chars)</label>
                        <textarea name="message" id="msg_body" maxlength="1500" required placeholder="Describe the technical issue..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit" id="submit-btn">Submit Ticket</button>
                    <p id="status-msg" style="display: none;">Sending...</p>
                </form>
            </div>
        </section>
    </main>

    <script>
        // ========== EMAIL VALIDATION (LOCAL PART + DOMAIN MX) ==========
        const emailInput = document.getElementById("email_addr");
        const emailError = document.getElementById("email-error");
        const emailWarning = document.getElementById("email-warning");

        function clearEmailMessages() {
            emailError.style.display = "none";
            emailWarning.style.display = "none";
            emailInput.style.borderColor = "#eee";
        }

        function showEmailError(message) {
            emailError.textContent = message;
            emailError.style.display = "block";
            emailInput.style.borderColor = "#e74c3c";
        }

        function showEmailWarning(message) {
            emailWarning.textContent = message;
            emailWarning.style.display = "block";
            emailInput.style.borderColor = "#f39c12";
        }

        // Extract local part and domain
        function parseEmail(email) {
            const parts = email.split('@');
            if (parts.length !== 2) return { local: null, domain: null };
            return { local: parts[0].toLowerCase(), domain: parts[1].toLowerCase() };
        }

        // Validate local part format
        function validateLocalPart(local) {
            if (!local || local.length === 0) {
                return { valid: false, message: "Missing username before @." };
            }
            if (local.length < 2) {
                return { valid: false, message: "Username is too short (at least 2 characters)." };
            }
            if (local.length > 64) {
                return { valid: false, message: "Username is too long (max 64 characters)." };
            }
            // Cannot start or end with a dot
            if (local.startsWith('.') || local.endsWith('.')) {
                return { valid: false, message: "Username cannot start or end with a dot." };
            }
            // Cannot have consecutive dots
            if (local.includes('..')) {
                return { valid: false, message: "Username cannot contain consecutive dots." };
            }
            // Allowed characters: a-z 0-9 . _ -
            if (!/^[a-z0-9._-]+$/.test(local)) {
                return { valid: false, message: "Username contains invalid characters. Only letters, numbers, dots, underscores, and hyphens are allowed." };
            }
            // Additional sanity: if all digits, it's suspicious but not invalid
            let warning = null;
            if (/^\d+$/.test(local)) {
                warning = "Username is all numbers – please double‑check it's correct.";
            }
            // If no dot and longer than 12 characters (possible missing dot like firstlast)
            if (!local.includes('.') && local.length > 12 && /^[a-z]+$/.test(local)) {
                warning = warning || "Username has no dot and is long – did you mean first.last?";
            }
            return { valid: true, message: null, warning: warning };
        }

        // Domain MX check (same as before)
        async function domainHasMX(domain) {
            try {
                const url = `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=MX`;
                const response = await fetch(url);
                const data = await response.json();
                return data.Answer && data.Answer.some(record => record.type === 15);
            } catch (err) {
                console.warn("DNS check failed:", err);
                return false;
            }
        }

        // Common domain typos
        const commonTypos = {
            "gmil.com": "gmail.com", "hotmal.com": "hotmail.com", "yaho.com": "yahoo.com",
            "outlok.com": "outlook.com", "protonmai.com": "protonmail.com", "gmai.com": "gmail.com",
            "gmail.co": "gmail.com", "hotmial.com": "hotmail.com", "yahooo.com": "yahoo.com"
        };

        // Main validation function
        async function validateFullEmail(email) {
            clearEmailMessages();
            if (!email || email.trim() === "") {
                showEmailError("Email address is required.");
                return false;
            }

            const { local, domain } = parseEmail(email);
            if (!local || !domain) {
                showEmailError("Please include an '@' symbol and a valid domain (e.g., name@example.com).");
                return false;
            }

            // 1. Validate local part
            const localCheck = validateLocalPart(local);
            if (!localCheck.valid) {
                showEmailError(localCheck.message);
                return false;
            }
            if (localCheck.warning) {
                showEmailWarning(localCheck.warning);
                // Warning does NOT block submission – user can still proceed
            }

            // 2. Check domain typos
            if (commonTypos[domain]) {
                showEmailError(`Did you mean @${commonTypos[domain]}?`);
                return false;
            }

            // 3. Basic domain format
            if (!domain.includes('.') || domain.split('.').pop().length < 2) {
                showEmailError("Please enter a complete domain (e.g., @example.com).");
                return false;
            }

            // 4. MX record check (silent while checking)
            emailWarning.textContent = "Checking domain...";
            emailWarning.style.display = "block";
            const hasMX = await domainHasMX(domain);
            if (!hasMX) {
                showEmailError("This domain does not appear to accept emails. Please use a working email address.");
                emailWarning.style.display = "none";
                return false;
            }

            // All good
            clearEmailMessages();
            return true;
        }

        // Real-time validation on blur
        emailInput.addEventListener("blur", async function() {
            if (emailInput.value.trim() === "") {
                showEmailError("Email address is required.");
                return;
            }
            await validateFullEmail(emailInput.value.trim());
        });

        // Clear errors when user starts typing
        emailInput.addEventListener("input", function() {
            clearEmailMessages();
        });

        // ========== FORM SUBMISSION ==========
        const form = document.getElementById("support-form-element");
        const statusMsg = document.getElementById("status-msg");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            
            const email = emailInput.value.trim();
            const isEmailValid = await validateFullEmail(email);
            if (!isEmailValid) {
                statusMsg.style.display = "block";
                statusMsg.style.color = "red";
                statusMsg.innerHTML = "Please correct the email address before submitting.";
                return;
            }

            // If there's only a warning (not an error), we still allow submission
            // but we may ask for confirmation (optional)
            if (emailWarning.style.display === "block") {
                const proceed = confirm("Your email address has a possible typo. Continue anyway?");
                if (!proceed) return;
            }

            statusMsg.style.display = "block";
            statusMsg.style.color = "#0F52BA";
            statusMsg.innerHTML = "Processing Ticket...";

            const data = new FormData(form);

            fetch("https://formspree.io/f/xvzvaadq", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    window.location.href = "thank-you.html";
                } else {
                    statusMsg.style.color = "red";
                    statusMsg.innerHTML = "Oops! Submission failed. Please try again.";
                }
            }).catch(error => {
                statusMsg.style.color = "red";
                statusMsg.innerHTML = "Connection error. Please check your network.";
            });
        });
    </script>
    <footer>&copy; 2026 zemenpay</footer>
</body>
</html>
