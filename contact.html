
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Mereja| Contact Support</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container { max-width: 800px; margin: 40px auto; }
        .form-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 5px solid #0F52BA;
        }
        .form-box h3 { color: #0F52BA; font-size: 1.8rem; margin-bottom: 10px; }
        .form-box p { color: #666; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-row .form-group { flex: 1; }
        
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #333; font-size: 0.9rem; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 6px; 
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #0F52BA; outline: none; }
        textarea { height: 150px; resize: vertical; }

        .btn-submit { 
            background: #0F52BA; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-weight: 900; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-submit:hover { background: #fcd116; color: #0F52BA; }
        
        #status-msg { 
            text-align: center; 
            padding: 10px; 
            border-radius: 4px; 
            font-weight: 700; 
            margin-top: 15px; 
        }
    </style>
</head>
<body>
    <script src="nav.js"></script>

    <main class="container">
        <section id="consultation-form" class="form-container">
            <div class="form-box">
                <h3>Support Request</h3>
                <p>Your request will be sent to our engineering team for review.</p>
                
                <form id="support-form-element">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" id="f_name" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" id="l_name" required placeholder="Peter">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" name="email" id="email_addr" required placeholder="support@zemenpay.com">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" id="phone_num" required placeholder="+971 ...">
                    </div>

                    <div class="form-group">
                        <label>Message (Max 1500 chars)</label>
                        <textarea name="message" id="msg_body" maxlength="1500" required placeholder="Describe the technical issue..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit" id="submit-btn">Submit Ticket</button>
                    <p id="status-msg" style="display: none;">Sending...</p>
                </form>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("support-form-element");
        const status = document.getElementById("status-msg");

        form.addEventListener("submit", function(event) {
            event.preventDefault();
            status.style.display = "block";
            status.style.color = "#0F52BA";
            status.innerHTML = "Processing Ticket...";

            const data = new FormData(form);

            fetch("https://formspree.io/f/xvzvaadq", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
			// Find this section in your contact.html

    if (response.ok) {
        // CHANGE THIS LINE:
        // From: window.location.href = "https://www.resonwave.com/thank-you.html";
        // To your local Live Mereja thank-you page:
        window.location.href = "thank-you.html"; 
    } else {
        status.style.color = "red";
        status.innerHTML = "Oops! Submission failed. Please try again.";
    }
}).catch(error => {
	        
                status.style.color = "red";
                status.innerHTML = "Connection error. Please check your network.";
            });
        });
    </script>
	<footer>&copy; 2026 zemenpay</footer>
</body>
</html>
