<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You |Live Mereja Ecosystems</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .thank-you-wrapper {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #f4f7f6; /* Matching your dashboard light gray */
        }
        .thank-you-content { 
            max-width: 600px; 
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 6px solid #0F52BA; /* Sapphire Blue accent */
        }
        .thank-you-content h1 {
            color: #0F52BA;
            font-size: 3.5rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .sub-label {
            color: #fcd116; /* Gold */
            font-weight: 900;
            display: block;
            margin-bottom: 10px;
        }
        .thank-you-content p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .back-home-btn { 
            text-decoration: none; 
            display: inline-block; 
            background-color: #0F52BA;
            color: white;
            padding: 15px 35px;
            border-radius: 6px;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-home-btn:hover {
            background-color: #fcd116;
            color: #0F52BA;
        }
    </style>
</head>
<body>

    <script src="nav.js"></script>

    <main class="thank-you-wrapper">
        <div class="thank-you-content">
            <span class="sub-label">TICKET RECEIVED</span>
            <h1>Success.</h1>
            
            <p>
                Your technical support request has been logged successfully. 
                Our engineering team will review the details and contact you via the provided email shortly. <br><br>
                <strong>System Delivery Team</strong><br>
                Live Mereja Ecosystem
            </p>
            
            <a href="index.html" class="back-home-btn">
                Return to Dashboard
            </a>
        </div>
    </main>

</body>
</html>
